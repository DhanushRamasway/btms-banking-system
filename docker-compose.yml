version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: btms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: btms
      POSTGRES_PASSWORD: btms_password
      POSTGRES_DB: btms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btms"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: btms-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://btms:btms_password@postgres:5432/btms
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: btms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
